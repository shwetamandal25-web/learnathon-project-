  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Page</title>
  </head>
  <body>
    <header>
      <nav>
        <button><a href="index.html">Home</a></button>
        <button><a href="about.html">About</a></button>
        <button><a href="feedback.html">Feedbacks</a></button>
        <button><a href="contact.html">Contact</a></button>
      </nav>
    </header>


    <main></main>

    <main>
        <h1>Contact Us</h1>
        <p>We'd love to hear from you! Feel free to contact us using the form below.</p>
        <section>

            <form action="#" method="post">

                <label for="name">Full Name</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                <br><br>

                <label for="email">Email Address</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <br><br>

                <label for="phone">Phone Number</label><br>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                <br><br>

                <label for="subject">Subject</label><br>
                <input type="text" id="subject" name="subject" placeholder="Enter subject">
                <br><br>

                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="6" cols="40" placeholder="Write your message here..." required></textarea>
                <br><br>

                <button type="submit">Send Message</button>

            </form>

        </section>

        <hr>

        <section>
            <h2>Our Contact Information</h2>

            <p><strong>Email:</strong> support@example.com</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Address:</strong> Bengaluru, Karnataka, India</p>
        </section>
    </main>

    </footer>
  </body>
